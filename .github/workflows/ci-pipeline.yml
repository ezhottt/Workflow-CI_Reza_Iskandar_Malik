name: MLflow CI and Docker Push

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas scikit-learn

      - name: Train Model via MLProject
        run: |
          cd MLProject
          # Menjalankan MLProject menggunakan environment lokal (pip) agar cepat
          mlflow run . --env-manager local

      - name: Upload MLruns Artifacts to GitHub (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: MLProject/mlruns/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Model to Docker Hub
        run: |
          cd MLProject
          # Mengambil Run ID terbaru yang digenerate oleh MLflow
          RUN_ID=$(ls mlruns/0/ | grep -v meta.yaml | head -n 1)
          MODEL_PATH="mlruns/0/$RUN_ID/artifacts/model"
          IMAGE_NAME="${{ secrets.DOCKER_USERNAME }}/sensus-income-model:latest"
          
          echo "Membuat Docker Image dari model..."
          mlflow models build-docker -m $MODEL_PATH -n $IMAGE_NAME
          
          echo "Mendorong Image ke Docker Hub..."
          docker push $IMAGE_NAME