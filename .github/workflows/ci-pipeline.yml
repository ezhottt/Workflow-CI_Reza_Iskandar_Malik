name: MLflow CI and Docker Push

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn mlflow==2.19.0

     - name: Train Model via MLProject
        run: |
          cd MLProject
          unset MLFLOW_RUN_ID || true
          unset MLFLOW_EXPERIMENT_ID || true
          unset MLFLOW_EXPERIMENT_NAME || true
          mlflow run . --env-manager local

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          cd MLProject
          IMAGE_NAME="${{ secrets.DOCKER_USERNAME }}/sensus-income-model:latest"
          
          echo "Building Docker Image..."
          docker build -t $IMAGE_NAME .
          
          echo "Pushing to Docker Hub..."
          docker push $IMAGE_NAME